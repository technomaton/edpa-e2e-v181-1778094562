name: Sync collaborators to people.yaml

# Reacts to repository collaborator changes:
#   added | edited → open a PR with the auto-filled stub for review
#   removed         → commit availability flip directly (factual, no
#                     human input needed)
# Manual runs via workflow_dispatch are also supported, useful when
# back-filling people.yaml on a brand-new EDPA install or after a
# burst of changes that the event-based path missed.

on:
  member:
    types: [added, removed, edited]
  workflow_dispatch:
    inputs:
      mode:
        description: 'apply (removes only) | apply --auto-add (adds + removes) | status (no writes)'
        required: false
        type: choice
        options: [apply, apply-with-adds, status]
        default: apply

permissions:
  contents: write
  pull-requests: write
# `members: read` does NOT exist as a workflow permission — GitHub
# rejects the file with HTTP 422. Org-member visibility comes from
# the calling token's account scope instead. The default GITHUB_TOKEN
# only sees direct collaborators on the repo. If your team uses
# GitHub Teams or pending invitations and this workflow misses
# people, store a Personal Access Token (PAT with `repo` + `read:org`
# scopes) as the `COLLAB_SYNC_TOKEN` secret on this repo. The
# workflow falls back to GITHUB_TOKEN when the PAT is not configured.

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Python deps
        run: pip install pyyaml ruamel.yaml

      - name: Decide action
        id: decide
        env:
          EVENT_NAME: ${{ github.event_name }}
          ACTION: ${{ github.event.action }}
          MODE: ${{ inputs.mode }}
        run: |
          # member.removed → flip availability directly on main
          # member.added / edited → run with --auto-add, then PR the result
          # workflow_dispatch → honor the input
          if [ "$EVENT_NAME" = "member" ]; then
            case "$ACTION" in
              removed) echo "mode=apply-removes-direct" >> "$GITHUB_OUTPUT" ;;
              added|edited) echo "mode=apply-adds-pr"   >> "$GITHUB_OUTPUT" ;;
              *) echo "mode=skip" >> "$GITHUB_OUTPUT" ;;
            esac
          else
            case "$MODE" in
              apply)            echo "mode=apply-removes-direct" >> "$GITHUB_OUTPUT" ;;
              apply-with-adds)  echo "mode=apply-adds-pr"        >> "$GITHUB_OUTPUT" ;;
              status)           echo "mode=status"               >> "$GITHUB_OUTPUT" ;;
              *)                echo "mode=apply-removes-direct" >> "$GITHUB_OUTPUT" ;;
            esac
          fi

      - name: Skip — uninteresting event
        if: steps.decide.outputs.mode == 'skip'
        run: echo "Nothing to do for action '${{ github.event.action }}'."

      - name: Status only
        if: steps.decide.outputs.mode == 'status'
        env:
          # Prefer COLLAB_SYNC_TOKEN PAT (read:org + repo) when set;
          # GITHUB_TOKEN sees only direct repo collaborators.
          GH_TOKEN: ${{ secrets.COLLAB_SYNC_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          python plugin/edpa/scripts/sync_collaborators.py status \
            --repo "$GITHUB_REPOSITORY"

      - name: Apply removes — direct commit to main
        if: steps.decide.outputs.mode == 'apply-removes-direct'
        env:
          # Prefer COLLAB_SYNC_TOKEN PAT (read:org + repo) when set;
          # GITHUB_TOKEN sees only direct repo collaborators.
          GH_TOKEN: ${{ secrets.COLLAB_SYNC_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          python plugin/edpa/scripts/sync_collaborators.py apply \
            --repo "$GITHUB_REPOSITORY"
          if [ -n "$(git status --porcelain .edpa/config/people.yaml 2>/dev/null)" ]; then
            git config user.name  "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add .edpa/config/people.yaml
            git commit -m "chore(people): mark removed collaborator(s) unavailable

            Auto-generated by collaborators-sync workflow.
            Triggered by ${{ github.event_name }}: ${{ github.event.action }}."
            git push
          else
            echo "No people.yaml change — collaborator already flagged unavailable."
          fi

      - name: Apply adds — open PR with auto-filled stubs
        if: steps.decide.outputs.mode == 'apply-adds-pr'
        env:
          # Prefer COLLAB_SYNC_TOKEN PAT (read:org + repo) when set;
          # GITHUB_TOKEN sees only direct repo collaborators.
          GH_TOKEN: ${{ secrets.COLLAB_SYNC_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          python plugin/edpa/scripts/sync_collaborators.py apply \
            --repo "$GITHUB_REPOSITORY" \
            --auto-add
          if [ -z "$(git status --porcelain .edpa/config/people.yaml 2>/dev/null)" ]; then
            echo "No people.yaml change — nothing to PR."
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          BRANCH="bot/sync-collaborators-${{ github.run_id }}"
          git checkout -b "$BRANCH"
          git add .edpa/config/people.yaml
          git commit -m "chore(people): sync collaborators from GitHub"
          git push -u origin "$BRANCH"
          gh pr create \
            --title "chore(people): sync collaborators (auto-filled stubs)" \
            --body "$(cat <<'EOF'
          Auto-generated by the collaborators-sync workflow.

          ### What changed
          - New collaborator(s) on this repo were missing from `people.yaml`.
          - This PR appends stub entries with whatever `gh api users/{login}`
            could fill in (login, public name, public email when set).

          ### Maintainer action required
          Each new entry has these fields **blank** — please fill them in
          before merging so EDPA can credit capacity correctly:

          - \`role\`     (Arch / Dev / DevSecOps / PM / QA)
          - \`team\`
          - \`fte\`
          - \`capacity_per_iteration\`

          Once filled in, merge this PR. EDPA's \`sync push --assignee\`
          will start routing issues to the new collaborator on the next
          run.

          ### Why a PR and not a direct commit?
          Removing a collaborator is a factual event — the workflow
          flips \`availability\` on \`main\` directly. Adding one
          requires data only a human knows (role, FTE) so the workflow
          stops here for review. See \`docs/playbook.md\` §1.5.
          EOF
          )"
